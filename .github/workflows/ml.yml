name: ml

on:
  pull_request:
    paths:
      - "ml/**"
      - "ingestion/fdic_institutions.py"
      - "pyproject.toml"
      - ".github/workflows/ml.yml"
  push:
    branches: [machine-learning-portfolio, main]
    paths:
      - "ml/**"

jobs:
  ml-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync (ml extra + dev; evidently is isolated to avoid the plotly<6/>=6 clash)
        run: uv sync --extra ml --group dev
      - name: Cost guard ($0 — fail if ML imports a billable service)
        run: uv run pytest ml/tests/test_no_billable_imports.py -q
      - name: ML test suite
        run: uv run pytest ml/tests -q
      - name: Model metric gate (PR-AUC beats logit + margin, ROC<0.98, ECE bound)
        run: uv run python ml/scripts/metric_gate.py
      - name: Drift-monitor smoke (evidently isolated, no project plotly>=6)
        run: uv run --isolated --no-project --with "evidently>=0.7" --with pandas --with numpy
          python -c "import evidently; from evidently import Report; from evidently.presets import DataDriftPreset; print('evidently', evidently.__version__, 'imports + Report API available')"
