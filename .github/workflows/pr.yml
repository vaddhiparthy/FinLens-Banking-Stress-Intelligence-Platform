name: pr

on:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync
        run: uv sync --all-groups
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest
