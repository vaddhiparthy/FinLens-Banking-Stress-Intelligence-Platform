name: professional
services:
  finlens-web:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    pull_policy: never
    container_name: professional-finlens-web
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    memswap_limit: 512m
    env_file:
      - /opt/platform/vault/secrets/professional/finlens.env
    environment:
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@professional-finlens-db:5432/finlens
    volumes:
      - ./data:/app/data
      - ./.duckdb:/app/.duckdb
    restart: unless-stopped
    expose:
      - "8501"
    networks:
      - professional_net

  finlens-public:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    pull_policy: never
    container_name: professional-finlens-public
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/finlens/_stcore/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    memswap_limit: 512m
    env_file:
      - /opt/platform/vault/secrets/professional/finlens.env
    environment:
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@professional-finlens-db:5432/finlens
    command:
      - streamlit
      - run
      - streamlit_app/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
      - --server.enableCORS=false
      - --server.enableXsrfProtection=false
      - --server.baseUrlPath=finlens
    volumes:
      - ./data:/app/data
      - ./.duckdb:/app/.duckdb
    restart: unless-stopped
    expose:
      - "8501"
    networks:
      - platform_edge
      - professional_net

  finlens-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    pull_policy: never
    container_name: professional-finlens-api
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    memswap_limit: 512m
    env_file:
      - /opt/platform/vault/secrets/professional/finlens.env
    environment:
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@professional-finlens-db:5432/finlens
    volumes:
      - ./data:/app/data
      - ./.duckdb:/app/.duckdb
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - platform_edge
      - professional_net

  finlens-db:
    image: postgres@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50  # was postgres:16-alpine, pinned 2026-05-21
    container_name: professional-finlens-db
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    environment:
      POSTGRES_USER: finlens
      POSTGRES_PASSWORD: finlens
      POSTGRES_DB: finlens
    volumes:
      - professional_finlens_control_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finlens -d finlens"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    networks:
      - professional_net

  airflow-db:
    image: postgres@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50  # was postgres:16-alpine, pinned 2026-05-21
    container_name: professional-finlens-airflow-db
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - professional_finlens_airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    networks:
      - professional_net

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    pull_policy: never
    container_name: professional-finlens-airflow-init
    depends_on:
      airflow-db:
        condition: service_healthy
      finlens-db:
        condition: service_healthy
    env_file:
      - /opt/platform/vault/secrets/professional/finlens.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@professional-finlens-airflow-db:5432/airflow
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@professional-finlens-db:5432/finlens
      FINLENS_DUCKDB_PATH: /opt/finlens/.duckdb/finlens.duckdb
    volumes:
      - ./data:/opt/finlens/data
      - ./.duckdb:/opt/finlens/.duckdb
      - ./airflow/dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Fin --lastname Lens --role Admin --email admin@example.com || true;
      airflow dags unpause dag_ingest_fdic || true;
      airflow dags unpause dag_ingest_fred || true;
      airflow dags unpause dag_ingest_qbp || true;
      airflow dags unpause dag_ingest_nic || true;
      airflow dags unpause dag_sync_control_plane || true;
      airflow dags unpause dag_transform_and_quality || true"
    networks:
      - professional_net

  airflow-web:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    pull_policy: never
    container_name: professional-finlens-airflow-web
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/health\", timeout=8).read()'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - /opt/platform/vault/secrets/professional/finlens.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@professional-finlens-airflow-db:5432/airflow
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@professional-finlens-db:5432/finlens
      FINLENS_DUCKDB_PATH: /opt/finlens/.duckdb/finlens.duckdb
    command: webserver
    volumes:
      - ./data:/opt/finlens/data
      - ./.duckdb:/opt/finlens/.duckdb
      - ./airflow/dags:/opt/airflow/dags
    expose:
      - "8080"
    networks:
      - professional_net

  scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    pull_policy: never
    container_name: professional-finlens-scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 1.5g
    memswap_limit: 1.5g
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - /opt/platform/vault/secrets/professional/finlens.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@professional-finlens-airflow-db:5432/airflow
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@professional-finlens-db:5432/finlens
      FINLENS_DUCKDB_PATH: /opt/finlens/.duckdb/finlens.duckdb
    command: scheduler
    volumes:
      - ./data:/opt/finlens/data
      - ./.duckdb:/opt/finlens/.duckdb
      - ./airflow/dags:/opt/airflow/dags
    networks:
      - professional_net

volumes:
  professional_finlens_control_db:
    external: true
  professional_finlens_airflow_db:
    external: true
networks:
  platform_edge:
    external: true
  professional_net:
    external: true
