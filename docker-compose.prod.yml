services:
  finlens-streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: astrax-compute-cloud-finlens-streamlit
    env_file:
      - .env
    environment:
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@finlens-control-postgres:5432/finlens
    volumes:
      - ./data:/app/data
      - ./.duckdb:/app/.duckdb
    restart: unless-stopped
    expose:
      - "8501"

  finlens-streamlit-public:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: astrax-compute-cloud-finlens-streamlit-public
    env_file:
      - .env
    environment:
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@finlens-control-postgres:5432/finlens
    command:
      - streamlit
      - run
      - streamlit_app/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
      - --server.enableCORS=false
      - --server.enableXsrfProtection=false
      - --server.baseUrlPath=finlens
    volumes:
      - ./data:/app/data
      - ./.duckdb:/app/.duckdb
    restart: unless-stopped
    expose:
      - "8501"

  finlens-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: astrax-compute-cloud-finlens-api
    env_file:
      - .env
    environment:
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@finlens-control-postgres:5432/finlens
    volumes:
      - ./data:/app/data
      - ./.duckdb:/app/.duckdb
    restart: unless-stopped
    expose:
      - "8000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: astrax-compute-cloud-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    expose:
      - "3001"

  finlens-control-postgres:
    image: postgres:16-alpine
    container_name: astrax-compute-cloud-finlens-control-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finlens
      POSTGRES_PASSWORD: finlens
      POSTGRES_DB: finlens
    volumes:
      - finlens-control-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finlens -d finlens"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  airflow-postgres:
    image: postgres:16-alpine
    container_name: astrax-compute-cloud-finlens-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: astrax-compute-cloud-finlens-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
      finlens-control-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@finlens-control-postgres:5432/finlens
      FINLENS_DUCKDB_PATH: /opt/finlens/.duckdb/finlens.duckdb
    volumes:
      - ./data:/opt/finlens/data
      - ./.duckdb:/opt/finlens/.duckdb
      - ./airflow/dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Fin --lastname Lens --role Admin --email admin@example.com || true;
      airflow dags unpause dag_ingest_fdic || true;
      airflow dags unpause dag_ingest_fred || true;
      airflow dags unpause dag_ingest_qbp || true;
      airflow dags unpause dag_ingest_nic || true;
      airflow dags unpause dag_sync_control_plane || true;
      airflow dags unpause dag_transform_and_quality || true"

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: astrax-compute-cloud-finlens-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@finlens-control-postgres:5432/finlens
      FINLENS_DUCKDB_PATH: /opt/finlens/.duckdb/finlens.duckdb
    command: webserver
    volumes:
      - ./data:/opt/finlens/data
      - ./.duckdb:/opt/finlens/.duckdb
      - ./airflow/dags:/opt/airflow/dags
    expose:
      - "8080"

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: astrax-compute-cloud-finlens-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      POSTGRES_SYNC_DSN: postgresql://finlens:finlens@finlens-control-postgres:5432/finlens
      FINLENS_DUCKDB_PATH: /opt/finlens/.duckdb/finlens.duckdb
    command: scheduler
    volumes:
      - ./data:/opt/finlens/data
      - ./.duckdb:/opt/finlens/.duckdb
      - ./airflow/dags:/opt/airflow/dags

  worldofhelios-admin:
    image: python:3.12-slim
    env_file:
      - ./worldofhelios-site/runtime/helios-admin.env
    container_name: astrax-compute-cloud-personal-worldofhelios-admin
    restart: unless-stopped
    working_dir: /app
    command: [ python, scripts/helios_admin_server.py]
    environment:
      HELIOS_ADMIN_EMAIL: surya94v@gmail.com
      HELIOS_ADMIN_PORT: 18111
    volumes:
      - ./worldofhelios-site:/app


  worldofhelios-contact:
    image: python:3.12-slim
    env_file:
      - ./worldofhelios-site/runtime/helios-contact.env
    container_name: astrax-compute-cloud-personal-worldofhelios-contact
    restart: unless-stopped
    working_dir: /app
    command: [ python, scripts/contact_relay_server.py]
    environment:
      HELIOS_CONTACT_HOST: 0.0.0.0
      HELIOS_CONTACT_PORT: 18110
    volumes:
      - ./worldofhelios-site:/app
    expose:
      - "18110"


  caddy:
    image: caddy:2-alpine
    container_name: astrax-compute-cloud-edge
    restart: unless-stopped
    depends_on:
      - finlens-streamlit
      - finlens-streamlit-public
      - finlens-api
      - uptime-kuma
      - worldofhelios-admin
      - worldofhelios-contact
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./worldofhelios-site:/srv/worldofhelios:ro
      - caddy-data:/data
      - caddy-config:/config
      - /var/log/caddy:/var/log/caddy

volumes:
  caddy-data:
  caddy-config:
  uptime-kuma-data:
  finlens-control-postgres-data:
  airflow-postgres-data:
